<!doctype html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Somnuscape</title>
    <link rel="icon" href="/assets/favicon.svg">
    <link href="/assets/bootstrap.css" rel="stylesheet">
</head>

<body class="d-flex align-items-center py-4">
    <main class="form-signin w-25 m-auto">
        <form action="/login" method="post">
            <h1 class="h3 mb-4 fw-normal">What is your name?</h1>

            <div class="form-floating my-3">
                <input type="text" class="form-control" name="username" id="username" placeholder="Adam">
                <label for="username">Character Name</label>
            </div>
            <div class="form-floating my-3">
                <input type="password" class="form-control" name="password" id="password" placeholder="Password">
                <label for="password">Password</label>
            </div>

            <div class="text-danger">
                {{ error }}
            </div>

            <button class="btn btn-primary w-100 py-2 mt-4" type="submit">Confirm</button>
        </form>
    </main>
    <script src="/assets/htmx.js"></script>
    <script src="/assets/bootstrap.js"></script>
</body>

</html>
