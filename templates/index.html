{% extends "base.html" %}

{% block body %}
<div class="d-flex justify-content-around align-items-center bg-light-subtle shadow-sm">
    <span class="fs-2 mb-1 fw-semibold user-select-none">Somnuscape</span>
    <span class="fs-3"></span>
    <span class="fs-3"></span>
</div>
<main class="form-signin w-25 mx-auto">
    <form action="/login" method="post" autocomplete="off">
        <h1 class="h3 my-4 fw-normal">What is your name?</h1>

        <div class="form-floating my-3">
            <input type="text" class="form-control" name="username" id="username" placeholder="Adam">
            <label for="username">Character Name</label>
        </div>
        <div class="form-floating my-3">
            <input type="password" class="form-control" name="password" id="password" placeholder="Password">
            <label for="password">Password</label>
        </div>

        <div class="text-danger">
            {{ error }}
        </div>

        <button class="btn btn-primary w-100 py-2 mt-4" type="submit">Confirm</button>
    </form>
</main>
{% endblock body %}
